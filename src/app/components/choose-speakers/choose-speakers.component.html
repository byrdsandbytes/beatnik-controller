<ion-header>
  <ion-toolbar>
    <ion-title>Choose Speakers</ion-title>
    <ion-buttons slot="start">
      <ion-button (click)="closeModal()">
        <ion-icon name="close"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-buttons slot="end">
      <ion-button  (click)="saveSelection()">
        <!-- <ion-icon slot="end" name="save"></ion-icon> -->
        <ion-label>Done</ion-label>
        </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-searchbar (ionInput)="filterSpeakers($event)" placeholder="Search speakers by brand or model..."></ion-searchbar>
  <div class="choose-speakers-container">
    <p>Select the speakers you want to use:</p>
    <!-- Add your speaker selection logic here -->
    <div class="row">
      <div class="col-6" *ngFor="let speaker of filteredSpeakers" (click)="selectSpeaker(speaker.id)">
        <img [src]="speaker.image" alt="{{ speaker.manufacturer }} {{ speaker.model }}" class="speaker-image">
        <ion-item lines="none">
          <ion-icon [name]="'checkmark-circle'" *ngIf="selectedId === speaker.id"></ion-icon>
          <ion-label>
            <h2>{{ speaker.manufacturer }} {{ speaker.model }}</h2>
          </ion-label>
        </ion-item>

      </div>
    </div>

    <ion-button expand="full" color="primary" (click)="saveSelection()">
      Save Selection
    </ion-button>
  </div>
</ion-content>
